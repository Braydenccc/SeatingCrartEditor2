<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <meta name="description" content="免费、易用且开源的在线座位表编辑器。支持可视化拖拽排座、自定义教室布局、学生名单Excel导入与导出、一键随机排座等功能。专为教师和班级管理设计。">
  <meta name="keywords" content="座位表, 作业表编辑器, 座位表生成器, 排座系统, 教室排座, 随机排座, 智能排座, seating chart maker, 班级座位表排版软件, pc软件, Seatingcharteditor">
  <meta name="author" content="Braydenccc">

  <!-- Open Graph (OG) Meta Tags -->
  <meta property="og:title" content="BSCEv2 - 轻松实现可视化排座">
  <meta property="og:description" content="免费的在线座位表编辑器，支持拖拽、Excel导入和一键生成功能。让排版教室座位变得更简单。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BSCEv2">
  <meta property="og:image" content="/logo.png"> <!-- 建议在 public 目录下放置一张 1200x630 的 logo.png -->

  <!-- 搜索引擎和设备图标展示优化 -->
  <!-- <link rel="icon" type="image/svg+xml" href="/logo.svg"> --> <!-- 建议在 public 目录下放置 logo.svg，搜索引擎(如Google)推荐使用 svg 或 48x48 整数倍大小的图片 -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"> <!-- 建议在 public 目录下放置一张 180x180 的 apple-touch-icon.png -->

  <!-- Schema.org 结构化数据，帮助搜索引擎识别软件信息和logo -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "BSCEv2",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Web",
    "description": "免费、易用且开源的在线座位表编辑器。支持可视化拖拽排座、自定义教室布局、学生名单Excel导入与导出、一键随机排座等功能。",
    "image": "https://sce.jbyc.cc/logo.png",
    "url": "https://sce.jbyc.cc"
  }
  </script>

  <title>BSCEv2</title>

  <!-- Preconnect and Preload Critical Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Critical Path CSS: 提升首次内容渲染 (FCP) 速度，消除白屏感 -->
  <style>
    :root { --color-primary: #23587b; }
    body, html { margin: 0; padding: 0; font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #f5f5f5; }
    .loading-overlay { position: fixed; inset: 0; background: #f5f5f5; z-index: 10000; transition: opacity 0.3s; }
    .app-header-placeholder { height: 100px; background: var(--color-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 100%; }
    @media (max-width: 1024px) { .app-header-placeholder { height: 90px; } }
    @media (max-width: 768px) { .app-header-placeholder { height: 48px; } }
  </style>
</head>

<body>
  <div id="app">
    <!-- 关键路径占位符：在 Vue 挂载前显示的 HTML 结构 -->
    <div class="app-header-placeholder"></div>
    <div style="height: calc(100vh - 100px); background: #f5f5f5;"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
