name: Deploy to Retinbox Web Hosting

on:
  push:
    branches:
      - main
      - test

jobs:
  # ── 生产环境：main 分支 → sce.jbyc.cc ─────────────────────────────────────
  deploy-production:
    name: 🚀 Production (sce.jbyc.cc)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: shangzheny/rth-host-helper@sha256:789428be24aefa9c839075687bd8ca0e0819776ef439b81e7610a36eebc107fc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第 1 次尝试
      - name: Deploy (1/3)
        id: d1
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

      # 第 2 次尝试（仅在第 1 次失败后执行）
      - name: Wait before retry (1→2)
        if: steps.d1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (2/3)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

      # 第 3 次尝试（仅在第 2 次失败后执行）
      - name: Wait before retry (2→3)
        if: steps.d2.outcome == 'failure'
        run: |
          echo "::warning::Attempt 2 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (3/3)
        if: steps.d2.outcome == 'failure'
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

  # ── 测试环境：test 分支 → test.sce.jbyc.cc ────────────────────────────────
  deploy-staging:
    name: 🧪 Staging (test.sce.jbyc.cc)
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    container:
      image: shangzheny/rth-host-helper@sha256:789428be24aefa9c839075687bd8ca0e0819776ef439b81e7610a36eebc107fc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 注入测试环境标记
      - name: Patch test-env notices
        run: |
          # 1. 修改页面标题（加[测试版]前缀）
          sed -i 's|<title>座位表编辑器-scev2byccc</title>|<title>[测试版] 座位表编辑器-scev2byccc</title>|' index.html

          # 2. 替换登录弹窗中的旧提示文本为测试环境专属说明
          sed -i 's|本账号服务不保证可用性，请妥善备份您的数据|⚠️ 测试环境：账号与正式版不互通，用户数据可能随时被清除，请勿使用真实账号|' src/components/auth/LoginDialog.vue

          # 3. 在顶栏标题 h1 之后插入 commit 信息 span
          COMMIT_SHA=$(git log -1 --format='%h')
          COMMIT_MSG=$(git log -1 --format='%s' | cut -c1-40)
          COMMIT_SPAN="<span class=\"commit-badge\">${COMMIT_SHA} ${COMMIT_MSG}</span>"
          sed -i "s|<h1 class=\"header-text\">BraydenSCE V2</h1>|<h1 class=\"header-text\">BraydenSCE V2</h1>${COMMIT_SPAN}|" src/components/layout/AppHeader.vue
          # 在 </style> 前插入 commit-badge 样式
          sed -i 's|</style>|.commit-badge { display: inline-block; font-size: 11px; font-weight: 400; font-family: monospace; background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.25); border-radius: 6px; padding: 2px 8px; margin-left: 10px; vertical-align: middle; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n</style>|' src/components/layout/AppHeader.vue

      # 第 1 次尝试
      - name: Deploy (1/3)
        id: d1
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "test.sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

      # 第 2 次尝试
      - name: Wait before retry (1→2)
        if: steps.d1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (2/3)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "test.sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

      # 第 3 次尝试
      - name: Wait before retry (2→3)
        if: steps.d2.outcome == 'failure'
        run: |
          echo "::warning::Attempt 2 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (3/3)
        if: steps.d2.outcome == 'failure'
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "test.sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"
