name: Deploy to Retinbox Web Hosting

on:
  push:
    branches:
      - main
      - test
      - 'test/**'

jobs:
  # ── 生产环境：main 分支 → sce.jbyc.cc ─────────────────────────────────────
  deploy-production:
    name: 🚀 Production (sce.jbyc.cc)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: shangzheny/rth-host-helper@sha256:789428be24aefa9c839075687bd8ca0e0819776ef439b81e7610a36eebc107fc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第 1 次尝试
      - name: Deploy (1/3)
        id: d1
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

      # 第 2 次尝试（仅在第 1 次失败后执行）
      - name: Wait before retry (1→2)
        if: steps.d1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (2/3)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

      # 第 3 次尝试（仅在第 2 次失败后执行）
      - name: Wait before retry (2→3)
        if: steps.d2.outcome == 'failure'
        run: |
          echo "::warning::Attempt 2 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (3/3)
        if: steps.d2.outcome == 'failure'
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "sce.jbyc.cc"
          build: "build:web"
          outdir: "dist"

  # ── 测试环境：test 分支 → test.sce.jbyc.cc ────────────────────────────────
  deploy-staging:
    name: 🧪 Staging (test.sce.jbyc.cc)
    if: github.ref == 'refs/heads/test' || startsWith(github.ref, 'refs/heads/test/')
    runs-on: ubuntu-latest
    container:
      image: shangzheny/rth-host-helper@sha256:789428be24aefa9c839075687bd8ca0e0819776ef439b81e7610a36eebc107fc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve staging deploy path
        id: resolve-path
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH_NAME" = "test" ]; then
            DEPLOY_SITE="test.sce.jbyc.cc"
            SITE_URL="https://test.sce.jbyc.cc"
          else
            DEPLOY_PATH="${BRANCH_NAME#test/}"
            if ! [[ "$DEPLOY_PATH" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
              echo "::error::Invalid deploy path '$DEPLOY_PATH': only letters, numbers, dot, underscore, hyphen and slash are allowed."
              exit 1
            fi
            IFS='/' read -r -a SEGMENTS <<< "$DEPLOY_PATH"
            for segment in "${SEGMENTS[@]}"; do
              if [ -z "$segment" ] || [ "$segment" = "." ] || [ "$segment" = ".." ] || [ "$segment" = "test" ]; then
                echo "::error::Invalid deploy path segment '$segment'."
                exit 1
              fi
            done
            DEPLOY_SITE="test.sce.jbyc.cc/${DEPLOY_PATH}"
            SITE_URL="https://test.sce.jbyc.cc/${DEPLOY_PATH}"
          fi
          echo "deploy_site=$DEPLOY_SITE" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      # 第 1 次尝试
      - name: Deploy (1/3)
        id: d1
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "${{ steps.resolve-path.outputs.deploy_site }}"
          build: "build:test"
          outdir: "dist"

      # 第 2 次尝试
      - name: Wait before retry (1→2)
        if: steps.d1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (2/3)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "${{ steps.resolve-path.outputs.deploy_site }}"
          build: "build:test"
          outdir: "dist"

      # 第 3 次尝试
      - name: Wait before retry (2→3)
        if: steps.d2.outcome == 'failure'
        run: |
          echo "::warning::Attempt 2 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (3/3)
        if: steps.d2.outcome == 'failure'
        uses: rthsoftware/host-auto-deploy@3e5e4a34333b20df886e9366f6b37b54b2f67a1e
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        with:
          site: "${{ steps.resolve-path.outputs.deploy_site }}"
          build: "build:test"
          outdir: "dist"

      - name: Show staging URL
        run: 'echo "Staging URL: ${{ steps.resolve-path.outputs.site_url }}"'
