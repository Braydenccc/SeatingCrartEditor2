name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Desktop (Tauri)
        run: npm run build:desktop

      - name: Rename Artifacts
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          # Ensure target dir exists for release upload staging.
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $SOURCE = "src-tauri/target/release/app.exe"
          if (-not (Test-Path $SOURCE)) {
            throw "Tauri desktop executable not found: $SOURCE"
          }
          # 重命名 Tauri 桌面产物
          Move-Item $SOURCE "dist/BraydenSCE-Desktop-$TAG.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BraydenSCE-Desktop-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
