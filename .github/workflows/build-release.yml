name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Web
        run: npm run build:web

      - name: Build Desktop (Tauri)
        run: npm run build:lite

      - name: Rename Artifacts
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # 重命名 Tauri 便携版 (根据 tauri.conf.json 中的 productName)
          Move-Item "src-tauri/target/release/BraydenSCE.exe" "dist/BraydenSCE-Tauri-Portable-$TAG.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BraydenSCE-Tauri-Portable-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
